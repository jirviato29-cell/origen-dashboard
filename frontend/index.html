<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Origen Campus Ags</title>

    <!-- PWA / instalación en pantalla de inicio -->
    <meta name="theme-color" content="#112540" />
    <!-- iOS: sin esto, en iPhone la app no se instala como standalone -->
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Origen" />
    <!-- Fondo navy desde el primer pixel: evita el flash gris→navy antes de que cargue el CSS -->
    <style>
      html, body { background: #0B1A2F; margin: 0; }
      #boot-splash {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: #0B1A2F;
      }
      #boot-splash .ring {
        width: 34px; height: 34px; border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.18); border-top-color: #FF6B2B;
        animation: bootspin 0.8s linear infinite;
      }
      @keyframes bootspin { to { transform: rotate(360deg); } }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <!-- Splash de arranque: React lo reemplaza al montar -->
      <div id="boot-splash"><div class="ring"></div></div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
